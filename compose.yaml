services:
  gsc:
    build: .
    container_name: gsc
    restart: unless-stopped
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DB_PATH: /data/gsc-hub.db
    ports:
      # Host port mirrors the dev port so OAuth via http://localhost:5173
      # works (Google rejects the .local redirect). Container listens on 3000.
      - "127.0.0.1:5173:3000"
    volumes:
      - ./data:/data
    labels:
      dev.orbstack.domains: gsc.local
      dev.orbstack.http_port: "3000"
